name: Version Release

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml

permissions:
  actions: write
  contents: read

jobs:
  detect:
    name: Dispatch cargo-dist release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Build
        run: cargo build --locked

      - name: Detect package version change
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_version="$(awk -F '"' '/^version[[:space:]]*=/{print $2; exit}' Cargo.toml)"
          previous_version="$(git show "${BEFORE_SHA}:Cargo.toml" 2>/dev/null | awk -F '"' '/^version[[:space:]]*=/{print $2; exit}' || true)"
          tag="v${current_version}"

          if [ -z "$current_version" ]; then
            echo "Could not detect current Cargo.toml package version" >&2
            exit 1
          fi

          if [ "$current_version" = "$previous_version" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: ${current_version}"
            exit 0
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Release ${tag} already exists"
            exit 0
          fi

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Version changed: ${previous_version:-<none>} -> ${current_version}"

      - name: Dispatch cargo-dist release
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: gh workflow run release.yml --ref main -f tag="$RELEASE_TAG"
