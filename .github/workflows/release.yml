name: CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Build release binaries
        run: |
          cargo build --release --locked --target aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Prepare release asset
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/dedent-paste \
            target/x86_64-apple-darwin/release/dedent-paste \
            -output dist/dedent-paste
          chmod 755 dist/dedent-paste

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_name="main-${GITHUB_SHA::7}"

          if gh release view "$tag_name" >/dev/null 2>&1; then
            echo "Release $tag_name already exists; skipping."
            exit 0
          fi

          gh release create "$tag_name" \
            dist/dedent-paste \
            --target "$GITHUB_SHA" \
            --title "$tag_name" \
            --notes "Automated release for commit $GITHUB_SHA."
